<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Remoto MQTT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Sixtyfour+Convergence&display=swap"
    rel="stylesheet">
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    body {
      height: 100%;
      background-color: #850987;
    }

    header {
      position: relative;
      box-shadow: 4px 4px 20px rgb(0, 0, 0);
      border: solid 8px rgb(213, 89, 217);
    }

    .borde-interno {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 1em;
      border: solid 8px rgb(82, 27, 84);
      box-shadow: 0 0.2px 8px rgb(247, 0, 255);
      background-color: #1a1a1a;
    }


    h1 {
      margin: 1em 3em 1em 3em;
      font-family: "Sixtyfour Convergence", sans-serif;
      text-align: center;
      font-size: 2.5em;
      animation: parpadeo-rojo 1.5s infinite alternate;
      color: #00d9ff;
      position: relative;
      background-color: #1a1a1a;
      z-index: 1;
    }

    .botones-fila1,
    .botones-fila2,
    .botones-fila3,
    .botones-fila4 {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .contenedor-principal {
      display: flex;
      background-color: #1a1a1a;
      margin: 2em 1.5em;
      padding: 2em;
      border: solid 8px rgb(71, 23, 72);
    }

    .contenedor-gif {
      width: 49%;
      height: 20em;
      color: #ffffff;

    }

    .contenedor-gif {
      margin-top: 1em;
      width: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .contenedor-control {
      width: 50%;
      display: grid;
      justify-content: center;
    }

    .boton {
      margin: 0.5em 0.8em;
      width: 2.5em;
      height: 2.5em;
      background-color: #1a1a1a;
      position: relative;
      cursor: pointer;
      box-shadow: 0 0 10px #2200ff;
      font-size: 24px;
    }

    .boton::before {
      content: "";
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      background: transparent;
      z-index: -1;
      box-shadow:
        0 0 0 2px #2200ff,
        4px 0 0 0 #2200ff,
        -4px 0 0 0 #2200ff,
        0 4px 0 0 #2200ff,
        0 -4px 0 0 #2200ff;
    }

    .boton:hover {
      transform: scale(1.1);
    }

    .icono {
      width: 1em;
      transform-origin: center;
    }

    .abajo {
      margin-top: 0.2em;
      transform: scaleY(-1);
    }

    .izquierda {
      margin-top: 0.1em;
      transform: rotate(-90deg);
    }

    .derecha {
      margin-top: 0.1em;
      transform: rotate(90deg);
    }

    .claxon {
      margin-top: 0.2em;
      width: 1.5em;
    }

    .icono-diagonal {
      opacity: 60%;
      margin-top: 0.2em;
      width: 1.2em;
    }

    .rotacion180 {
      transform: rotate(180deg);
    }

    .direccional {
      background-color: #1a1a1a;
      border: none;
      width: 3.5em;
      height: 3.5em;
    }

    .foco {
      width: 100%;
      height: 100%;
    }

    .gif {
      width: 80%;
    }

    .boton-inferior {
      color: white;
      font-family: "Pixelify Sans", sans-serif;
      width: 8em;
      margin: 2em 1em;
      background-color: #1a1a1a;
      position: relative;
      cursor: pointer;
      box-shadow: 0 0 10px #f6ff00;
      font-size: 1.15em;
    }

    .boton-inferior::before {
      content: "";
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      background: transparent;
      z-index: -1;
      box-shadow:
        0 0 0 2px #f6ff00,
        4px 0 0 0 #f6ff00,
        -4px 0 0 0 #f6ff00,
        0 4px 0 0 #f6ff00,
        0 -4px 0 0 #f6ff00;
    }

    .boton-inferior:hover {
      transform: scale(1.1);
    }

    @keyframes parpadeo-rojo {
      from {
        text-shadow: 0 0 5px #af0000, 0 0 10px #af0000;
      }

      to {
        text-shadow: 0 0 15px #131313, 0 0 25px #131313;
      }
    }

    @media (max-width: 600px) {
      .borde-interno {
        margin: 0.5em 1em;
        height: 7em;
      }

      .contenedor-principal {
        display: block;
        padding: 0.5em;
      }

      .contenedor-gif {
        width: 100%;
        height: 14em;
        margin: 0em;

      }

      .gif {
        margin-top: 0em;
        width: 100%;
        border-style: none;
      }

      .contenedor-control {
        width: 100%;
      }

      .arte {
        font-size: 0.1em;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="borde-interno">
      <h1>CONTROL REMOTO</h1>
    </div>
  </header>

  <section class="contenedor-principal">
    <div class="contenedor-gif">
      <img src="img/carro.png" class="gif">
    </div>
    <div class="contenedor-control">
      <div class="botones-fila1">
        <button class="boton diagonal" id="btnAI"><img src="img/diagonal.png" class="icono-diagonal"></button>
        <button class="boton" id="btnAdelante"><img src="img/flecha.png" class="icono"></button>
        <button class="boton diagonal" id="btnAD"><img src="img/diagonal.png" class="icono-diagonal derecha"></button>
      </div>
      <div class="botones-fila2">
        <button class="boton" id="btnIzquierda"><img src="img/flecha.png" class="icono izquierda"></button>
        <button class="boton" id="claxon"><img src="img/claxon.png" class="claxon"></button>
        <button class="boton" id="btnDerecha"><img src="img/flecha.png" class="icono derecha"></button>
      </div>
      <div class="botones-fila3">
        <button class="boton diagonal" id="btnRI"><img src="img/diagonal.png"
            class="icono-diagonal izquierda abajo"></button>
        <button class="boton" id="btnReversa"><img src="img/flecha.png" class="icono abajo"></button>
        <button class="boton diagonal" id="btnED"><img src="img/diagonal.png"
            class="icono-diagonal derecha rotacion180"></button>
      </div>
      <div class="botones-fila4">
        <button class="direccional" id="dirIzquierda"><img src="img/apagado.png" class="foco" id="foco1"></button>
        <button class="boton-inferior" id="preventivas">Luces preventivas</button>
        <button class="direccional" id="dirDerecha"><img src="img/apagado.png" class="foco" id="foco2"></button>
      </div>
    </div>
  </section>

  <script>
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    client.on("connect", () => {
      console.log("Conectado al broker MQTT");
    });

    function send(cmd) {
      client.publish("esp32/control", cmd);
      console.log("Enviado:", cmd);
    }

    function bindButtonEvents(id, command) {
      const btn = document.getElementById(id);
      btn.addEventListener("mousedown", () => send(command));
      btn.addEventListener("mouseup", () => send("stop"));
      btn.addEventListener("mouseleave", () => send("stop"));
      btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        send(command);
      });
      btn.addEventListener("touchend", () => send("stop"));
    }

    // Movimiento direccional
    bindButtonEvents("btnAdelante", "forward");
    bindButtonEvents("btnReversa", "reverse");
    bindButtonEvents("btnIzquierda", "left");
    bindButtonEvents("btnDerecha", "right");
    bindButtonEvents("btnAI", "forward_left");
    bindButtonEvents("btnAD", "forward_right");
    bindButtonEvents("btnRI", "reverse_left");
    bindButtonEvents("btnED", "reverse_right");

    // Claxon
    bindButtonEvents("claxon", "claxon");

    // Luces direccionales y preventivas
    const foco1 = document.getElementById('foco1');
    const foco2 = document.getElementById('foco2');

    let encendidoIzquierda = false;
    let encendidoDerecha = false;
    let lucesPreventivas = false;

    document.getElementById('dirIzquierda').addEventListener('click', () => {
      encendidoIzquierda = !encendidoIzquierda;
      foco1.src = encendidoIzquierda ? 'img/encendido.png' : 'img/apagado.png';
      send(encendidoIzquierda ? 'light_left_on' : 'light_left_off');
    });

    document.getElementById('dirDerecha').addEventListener('click', () => {
      encendidoDerecha = !encendidoDerecha;
      foco2.src = encendidoDerecha ? 'img/encendido.png' : 'img/apagado.png';
      send(encendidoDerecha ? 'light_right_on' : 'light_right_off');
    });

    document.getElementById('preventivas').addEventListener('click', () => {
      lucesPreventivas = !lucesPreventivas;
      foco1.src = lucesPreventivas ? 'img/encendido.png' : 'img/apagado.png';
      foco2.src = lucesPreventivas ? 'img/encendido.png' : 'img/apagado.png';
      send(lucesPreventivas ? 'hazard_on' : 'hazard_off');
    });
  </script>
</body>

</html>
